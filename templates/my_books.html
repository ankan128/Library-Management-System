<!DOCTYPE html>
<html>
<head>
    <title>My Books</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<h1>My Issued Books</h1>

<a href="/dashboard">Dashboard</a>
<a href="/logout">Logout</a>

<table>
<tr>
    <th>Issue ID</th>
    <th>Book ID</th>
    <th>Title</th>
    <th>Author</th>
    <th>Issue Date</th>
    <th>Action</th>
</tr>

{% for book in books %}
<tr>
    <td>{{ book[0] }}</td>
    <td>{{ book[1] }}</td>
    <td>{{ book[2] }}</td>
    <td>{{ book[3] }}</td>
    <td>{{ book[4] }}</td>
    <td>
        <a href="/return_book/{{ book[0] }}">Return</a>
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
