<!DOCTYPE html>
<html>
<head>
    <title>My Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<h1>My Cart</h1>

<a href="/dashboard">Back to Dashboard</a>
<br><br>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Author</th>
    <th>Action</th>
</tr>

{% for book in books %}
<tr>
    <td>{{ book[0] }}</td>
    <td>{{ book[1] }}</td>
    <td>{{ book[2] }}</td>
    <td>
        <a href="/remove_from_cart/{{ book[0] }}">Remove</a>
    </td>
</tr>
{% endfor %}

</table>

<br><br>

<a href="/borrow_all">Borrow All Books</a>

</body>
</html>
