<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Admin Panel</h2>

<a class="btn btn-secondary mb-3" href="/dashboard">Back</a>

<form method="POST" action="/add_book" class="mb-4">

    <input class="form-control mb-2" name="title" placeholder="Book Title" required>

    <input class="form-control mb-2" name="author" placeholder="Author Name" required>

    <input class="form-control mb-2" type="number" name="quantity" placeholder="Quantity" min="1" required>

    <button class="btn btn-success">Add Book</button>

</form>

<table class="table table-bordered">
<tr>
<th>ID</th><th>Title</th><th>Author</th><th>Qty</th><th>Action</th>
</tr>

{% for book in books %}
<tr>
<td>{{ book[0] }}</td>
<td>{{ book[1] }}</td>
<td>{{ book[2] }}</td>
<td>{{ book[3] }}</td>
<td>
<a class="btn btn-danger" href="/delete_book/{{ book[0] }}">Delete</a>
</td>
</tr>
{% endfor %}

</table>

</body>
</html>
